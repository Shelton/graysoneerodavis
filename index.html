<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GribbleWorld</title>

  <!-- Google Fonts: Press Start 2P for pixel headers -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ========== NAVIGATION ========== -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">GribbleWorld</a>
      <ul class="nav-links">
        <li><a href="birthday.html" class="nav-link">[ BIRTHDAY ]</a></li>
      </ul>
    </div>
  </nav>

  <!-- ========== HERO — 50/50 grid split ========== -->
  <!-- Left column: heading + copy + CTA -->
  <!-- Right column: headshot placeholder -->
  <section class="hero">

    <div class="hero-text">
      <div class="hero-eyebrow">// PLAYER ONE //</div>
      <h1 class="hero-heading">
        Home of
        <span class="hero-name">Gribble</span>
      </h1>
      <p class="hero-blurb">
        Welcome to GribbleWorld &mdash; the official home base of Grayson.<br />
        Pick your quest and get to work.
      </p>
      <a href="birthday.html" class="btn-pixel">VIEW MISSION &rarr;</a>
    </div>

    <!-- Portrait photo placeholder: same aspect ratio as a portrait photo (3:4) -->
    <div class="hero-photo-col">
      <div class="img-placeholder portrait" role="img" aria-label="Headshot coming soon">
        <div class="placeholder-inner">
          <span class="placeholder-icon" aria-hidden="true">&#9672;</span>
          <p class="placeholder-label">HEADSHOT<br />COMING SOON</p>
        </div>
      </div>
    </div>

  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <p class="footer-text">GribbleWorld &copy; 2026 &nbsp;&nbsp; LVL 12 UNLOCKED</p>
  </footer>

</body>
</html>
